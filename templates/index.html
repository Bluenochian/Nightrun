<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIGHTRUN 3.0 - Control Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }

        :root {
            --bg: #0a0e27;
            --card: #1a1f3a;
            --border: #2a2f4a;
            --text: #e0e0ff;
            --text-dim: #808099;
            --primary: #00d9ff;
            --accent: #ff006e;
            --success: #00ff41;
            --warning: #ffb700;
            --error: #ff3333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        #app { display: flex; flex-direction: column; width: 100%; height: 100%; }

        /* HEADER */
        .header {
            height: 70px;
            background: linear-gradient(90deg, var(--card), transparent);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .header-left { display: flex; align-items: center; gap: 24px; flex: 1; }
        .logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--primary); text-shadow: 0 0 12px var(--primary); letter-spacing: 1px; }
        .theme-badge { padding: 6px 16px; background: rgba(0,217,255,0.1); border: 1px solid var(--primary); border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--primary); }

        .header-right { display: flex; gap: 12px; align-items: center; }

        .mode-toggle { display: flex; gap: 2px; background: var(--border); border-radius: 4px; }
        .mode-btn { padding: 8px 16px; background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-size: 12px; font-weight: 600; text-transform: uppercase; transition: all 0.2s; }
        .mode-btn.active { background: var(--primary); color: var(--bg); box-shadow: 0 0 12px rgba(0,217,255,0.4); }

        input[type="number"] { width: 70px; padding: 8px; background: var(--border); border: 1px solid var(--border); color: var(--text); font-family: 'JetBrains Mono', monospace; border-radius: 4px; text-align: center; }

        .btn { padding: 8px 16px; border: none; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .btn-launch { background: var(--success); color: var(--bg); }
        .btn-launch:hover { box-shadow: 0 0 20px rgba(0,255,65,0.6); }
        .btn-skip { background: var(--warning); color: var(--bg); }
        .btn-stop { background: var(--error); color: white; }

        /* MAIN */
        .content { flex: 1; display: flex; gap: 0; overflow: hidden; }

        .left-panel { width: 62%; display: flex; flex-direction: column; position: relative; border-right: 1px solid var(--border); }
        #bg-canvas { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        .preview-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; z-index: 2; }
        .preview-placeholder { text-align: center; opacity: 0.3; }
        .preview-placeholder-icon { font-size: 48px; margin-bottom: 12px; animation: float 3s infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        #preview { max-width: 95%; max-height: 95%; object-fit: contain; opacity: 0; transition: opacity 0.3s; border-radius: 4px; }
        #preview.visible { opacity: 1; }

        /* RIGHT PANEL */
        .right-panel { width: 38%; display: flex; flex-direction: column; background: rgba(26,31,58,0.5); }

        .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--card); }
        .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-size: 12px; font-weight: 600; text-transform: uppercase; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

        .tab-content { flex: 1; overflow-y: auto; padding: 16px; display: none; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6; }
        .tab-content.active { display: block; }

        .log-line { padding: 2px 0; white-space: pre-wrap; word-wrap: break-word; }
        .log-line.green { color: var(--success); }
        .log-line.red { color: var(--error); }
        .log-line.yellow { color: var(--warning); }
        .log-line.cyan { color: var(--primary); }
        .log-line.bright-cyan { color: #00ffff; font-weight: 600; }
        .log-line.dim { color: var(--text-dim); }

        /* PROMPT TAB */
        .prompt-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .chip { padding: 6px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; animation: chip-pop 0.3s ease; }
        @keyframes chip-pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .prompt-full { background: var(--border); border: 1px solid var(--border); border-radius: 4px; padding: 12px; max-height: 300px; overflow-y: auto; font-size: 11px; color: var(--text-dim); white-space: pre-wrap; word-wrap: break-word; }

        /* OPTIONS TAB */
        .options-section { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 12px; }
        .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); margin-bottom: 8px; }
        .option-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; font-size: 12px; }
        .option-label { flex: 1; color: var(--text-dim); }
        .option-input { flex: 0 0 150px; padding: 6px 8px; background: var(--border); border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
        .option-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 6px rgba(0,217,255,0.2); }

        .save-btn { padding: 8px 16px; background: var(--primary); color: var(--bg); border: none; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; text-transform: uppercase; margin-top: 12px; }

        /* PROGRESS */
        .progress-container { height: 50px; background: var(--card); border-top: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
        .progress-label { font-size: 11px; font-weight: 600; color: var(--text-dim); min-width: 100px; }
        .progress-bar { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: width 0.3s ease; box-shadow: 0 0 10px rgba(0,217,255,0.5); }
        .progress-eta { font-size: 11px; color: var(--text-dim); min-width: 80px; text-align: right; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--border); }
        ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 4px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <div class="header-left">
                <div class="logo">◈ NIGHTRUN 3.0</div>
                <div class="theme-badge" id="theme-badge">DEFAULT</div>
            </div>
            <div class="header-right">
                <div class="mode-toggle">
                    <button class="mode-btn active" data-mode="base">Base</button>
                    <button class="mode-btn" data-mode="upscale">Upscale</button>
                </div>
                <input type="number" id="count-input" value="10" min="1">
                <button class="btn btn-launch" id="btn-launch">▶ Launch</button>
                <button class="btn btn-skip" id="btn-skip">⏭ Skip</button>
                <button class="btn btn-stop" id="btn-stop">■ Stop</button>
            </div>
        </div>

        <div class="content">
            <div class="left-panel">
                <canvas id="bg-canvas"></canvas>
                <div class="preview-container">
                    <div class="preview-placeholder">
                        <div class="preview-placeholder-icon">◈</div>
                        <div>Awaiting Generation...</div>
                    </div>
                    <img id="preview" src="" alt="Preview">
                </div>
            </div>

            <div class="right-panel">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="log">Log</button>
                    <button class="tab-btn" data-tab="prompt">Prompt</button>
                    <button class="tab-btn" data-tab="options">Options</button>
                </div>

                <div class="tab-content active" id="log-content"></div>

                <div class="tab-content" id="prompt-content">
                    <div class="prompt-chips" id="prompt-chips"></div>
                    <div class="prompt-full" id="prompt-full">No prompt yet</div>
                </div>

                <div class="tab-content" id="options-content"></div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-label" id="progress-label">IDLE</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-eta" id="progress-eta">--:--</div>
        </div>
    </div>

    <script>
        // ========================
        // PARTICLE SYSTEM (Loomy-style)
        // ========================

        class ParticleSystem {
            constructor(canvas, theme) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.theme = theme;
                this.particles = [];
                this.time = 0;
                this.spawn();
            }

            spawn() {
                const count = 50;
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: (Math.random() - 0.5) * 0.5,
                        size: Math.random() * 2 + 1,
                        opacity: Math.random() * 0.5 + 0.2,
                        life: Math.random() * 0.5 + 0.5,
                    });
                }
            }

            update(dt) {
                this.time += dt;
                this.particles.forEach((p, i) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.opacity *= 0.995;

                    if (p.x < 0) p.x = this.canvas.width;
                    if (p.x > this.canvas.width) p.x = 0;
                    if (p.y < 0) p.y = this.canvas.height;
                    if (p.y > this.canvas.height) p.y = 0;

                    if (p.opacity < 0.01) {
                        this.particles[i] = {
                            x: Math.random() * this.canvas.width,
                            y: Math.random() * this.canvas.height,
                            vx: (Math.random() - 0.5) * 0.5,
                            vy: (Math.random() - 0.5) * 0.5,
                            size: Math.random() * 2 + 1,
                            opacity: Math.random() * 0.5 + 0.2,
                        };
                    }
                });
            }

            draw() {
                this.ctx.fillStyle = 'rgba(10, 14, 39, 0.05)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                const color = this.theme.colors[0] || '#00d9ff';
                this.particles.forEach(p => {
                    this.ctx.globalAlpha = p.opacity;
                    this.ctx.fillStyle = '#' + color;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();

                    // Connection lines
                    this.particles.forEach(p2 => {
                        const dx = p.x - p2.x, dy = p.y - p2.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 100) {
                            this.ctx.globalAlpha = p.opacity * (1 - dist/100) * 0.2;
                            this.ctx.strokeStyle = '#' + color;
                            this.ctx.lineWidth = 0.5;
                            this.ctx.beginPath();
                            this.ctx.moveTo(p.x, p.y);
                            this.ctx.lineTo(p2.x, p2.y);
                            this.ctx.stroke();
                        }
                    });
                });
                this.ctx.globalAlpha = 1;
            }
        }

        // ========================
        // UI CONTROLLER
        // ========================

        class NightrunDashboard {
            constructor() {
                this.currentMode = 'base';
                this.currentTheme = 'default';
                this.socket = null;
                this.config = {};
                this.particleSystem = null;
                this.canvas = document.getElementById('bg-canvas');
                
                this.setupCanvas();
                this.setupEvents();
                this.connectSocket();
                this.loadConfig();
                this.initParticles();
                this.startAnimationLoop();
            }

            setupCanvas() {
                const resizeCanvas = () => {
                    this.canvas.width = this.canvas.offsetWidth;
                    this.canvas.height = this.canvas.offsetHeight;
                    if (this.particleSystem) this.particleSystem.spawn();
                };
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
            }

            setupEvents() {
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentMode = e.target.dataset.mode;
                    });
                });

                document.getElementById('btn-launch').addEventListener('click', () => this.launch());
                document.getElementById('btn-skip').addEventListener('click', () => this.skip());
                document.getElementById('btn-stop').addEventListener('click', () => this.stop());

                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => this.switchTab(e.target.dataset.tab));
                });
            }

            connectSocket() {
                this.socket = io();

                this.socket.on('log_line', (data) => {
                    this.addLog(data.text, data.color);
                });

                this.socket.on('prompt_map', (data) => {
                    this.updatePromptDisplay(data);
                    this.changeTheme(data.theme_id);
                });

                this.socket.on('preview_image', (data) => {
                    if (data.b64) {
                        document.getElementById('preview').src = 'data:image/png;base64,' + data.b64;
                        document.getElementById('preview').classList.add('visible');
                    }
                });
            }

            addLog(text, color) {
                const container = document.getElementById('log-content');
                const line = document.createElement('div');
                line.className = `log-line ${color}`;
                line.textContent = text;
                container.appendChild(line);

                const lines = container.querySelectorAll('.log-line');
                if (lines.length > 2000) lines[0].remove();

                container.scrollTop = container.scrollHeight;
            }

            updatePromptDisplay(data) {
                const chipsContainer = document.getElementById('prompt-chips');
                chipsContainer.innerHTML = '';
                const colors = ['#ff006e', '#00d9ff', '#00ff41', '#ffb700', '#ff3333', '#a100f2', '#f72585', '#4361ee'];
                let i = 0;

                Object.entries(data.map).forEach(([key, value]) => {
                    const chip = document.createElement('div');
                    chip.className = 'chip';
                    chip.textContent = `${key}: ${value}`;
                    chip.style.background = colors[i % colors.length] + '40';
                    chip.style.borderLeft = `2px solid ${colors[i % colors.length]}`;
                    chipsContainer.appendChild(chip);
                    i++;
                });

                document.getElementById('prompt-full').textContent = data.full_prompt;
            }

            changeTheme(themeName) {
                if (themeName === this.currentTheme) return;

                this.currentTheme = themeName;
                document.getElementById('theme-badge').textContent = themeName.toUpperCase();
                
                const themeConfig = {
                    'cyber': { colors: ['00d9ff', 'ff006e'] },
                    'gothic': { colors: ['8b0000', 'ff1493'] },
                    'mystical': { colors: ['9d4edd', 'f72585'] },
                    'forest': { colors: ['2d6a4f', '40916c'] },
                    'cosmic': { colors: ['9d4edd', 'c77dff'] },
                    'ocean': { colors: ['0099cc', '00ccff'] },
                    'fire': { colors: ['ff6b35', 'ffb700'] },
                    'ice': { colors: ['e0f7ff', '87ceeb'] },
                    'rose': { colors: ['ff1493', 'ffb6c1'] },
                    'default': { colors: ['00d9ff', 'ff006e'] },
                };

                this.particleSystem = new ParticleSystem(this.canvas, themeConfig[themeName] || themeConfig['default']);
            }

            switchTab(tabName) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
                document.getElementById(`${tabName}-content`).classList.add('active');
            }

            launch() {
                const count = parseInt(document.getElementById('count-input').value);
                this.socket.emit('launch', { mode: this.currentMode, count });
            }

            skip() {
                this.socket.emit('skip', {});
            }

            stop() {
                this.socket.emit('stop', {});
            }

            async loadConfig() {
                const response = await fetch('/api/config');
                this.config = await response.json();
                this.renderOptions();
            }

            renderOptions() {
                const container = document.getElementById('options-content');
                container.innerHTML = '';

                const sections = {
                    'GENERAL': ['count', 'checkpoint', 'vae'],
                    'BASE GENERATION': ['base.width', 'base.height', 'base.steps', 'base.cfg_scale'],
                    'UPSCALE': ['upscale.enabled', 'upscale.width', 'upscale.height', 'upscale.steps'],
                };

                Object.entries(sections).forEach(([sectionName, keys]) => {
                    const section = document.createElement('div');
                    section.className = 'options-section';

                    const title = document.createElement('div');
                    title.className = 'section-title';
                    title.textContent = sectionName;
                    section.appendChild(title);

                    keys.forEach(key => {
                        const item = document.createElement('div');
                        item.className = 'option-item';

                        const label = document.createElement('label');
                        label.className = 'option-label';
                        label.textContent = key.replace(/[._]/g, ' ').toUpperCase();

                        const input = document.createElement('input');
                        input.type = 'text';
                        input.className = 'option-input';
                        input.dataset.key = key;

                        const keys_path = key.split('.');
                        let value = this.config;
                        keys_path.forEach(k => value = value[k]);
                        input.value = value;

                        item.appendChild(label);
                        item.appendChild(input);
                        section.appendChild(item);
                    });

                    container.appendChild(section);
                });

                const saveBtn = document.createElement('button');
                saveBtn.className = 'save-btn';
                saveBtn.textContent = '✓ Save Config';
                saveBtn.addEventListener('click', () => this.saveConfig());
                container.appendChild(saveBtn);
            }

            async saveConfig() {
                const inputs = document.querySelectorAll('.option-input');
                inputs.forEach(input => {
                    const keys = input.dataset.key.split('.');
                    let obj = this.config;
                    for (let i = 0; i < keys.length - 1; i++) {
                        if (!obj[keys[i]]) obj[keys[i]] = {};
                        obj = obj[keys[i]];
                    }
                    obj[keys[keys.length - 1]] = isNaN(input.value) ? input.value : parseFloat(input.value);
                });

                await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.config) });
                this.addLog('✓ Config saved', 'green');
            }

            initParticles() {
                this.particleSystem = new ParticleSystem(this.canvas, { colors: ['00d9ff', 'ff006e'] });
            }

            startAnimationLoop() {
                let lastTime = performance.now();
                const animate = (now) => {
                    const dt = (now - lastTime) / 1000;
                    lastTime = now;

                    if (this.particleSystem) {
                        this.particleSystem.update(dt);
                        this.particleSystem.draw();
                    }

                    requestAnimationFrame(animate);
                };
                requestAnimationFrame(animate);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            new NightrunDashboard();
        });
    </script>
</body>
</html>
